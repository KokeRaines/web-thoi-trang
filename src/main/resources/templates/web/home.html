<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIHO - Trang chủ</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/banner-slideshow.css}">
  <link rel="stylesheet" th:href="@{/css/carousel.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer-chatbox-backtotop.css}">
</head>
<body>
<!-- Header -->
  <div th:replace="fragments/header :: siteHeader"></div>
<div class="img-ad">
	<img src="/images/quangcao.png" style="width: 100%; height: 600px; display:block;">
</div>
<!-- Danh sách ngang sản phẩm mới -->
<div class="container my-5">
    <h3 class="mb-4">Sản phẩm mới & hot</h3>
    
    <div class="linear-carousel" style="overflow-x: auto; white-space: nowrap; padding-bottom: 15px; padding-left: 15px;">
        
        <div class="carousel-track" id="carouselTrack" style="display: flex !important; flex-direction: row !important; gap: 15px;">
            
            <div th:each="product : ${newProducts}" class="product-card" style="flex: 0 0 200px; display: inline-block; vertical-align: top;">
                <a th:href="@{/product/detail/{id}(id=${product.id})}" class="text-decoration-none text-dark" style="display: block; white-space: normal;">
                    <img th:src="${imageUrls[product.id]}" class="card-img-top" th:alt="${product.name}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px;">
                    <div style="padding-left: 10px;">
                        <h6 class="card-title mt-2" th:text="${product.name}" style="font-weight: bold;">Sản phẩm</h6>
                        <p>
                            <span th:if="${formattedPrices[product.id] == '0'}">
                                <strong class="text-warning">Sắp ra mắt</strong>
                            </span>
                            <span th:unless="${formattedPrices[product.id] == '0'}">
                                <strong th:text="'₫' + ${formattedPrices[product.id]}"></strong>
                            </span>
                        </p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
  
<!-- Back to Top Button -->
<button id="backToTop" title="Lên đầu trang">↑</button>
<div th:replace="fragments/footer :: siteFooter"></div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script type="module" src="/js/main.js"></script>
</body>
</html>
